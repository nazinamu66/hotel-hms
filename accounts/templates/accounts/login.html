<!DOCTYPE html>
<html>
<head>
    <title>Hotel System Login</title>
</head>
<body>
    <h2>Login</h2>

    {% if form.errors %}
        <p style="color:red;">Invalid username or password</p>
    {% endif %}

    <form method="post">
        {% csrf_token %}
        {{ form.username.label_tag }}<br>
        {{ form.username }}<br><br>

        {{ form.password.label_tag }}<br>
        {{ form.password }}<br><br>

        <button type="submit">Login</button>
    </form>
</body>
</html>
