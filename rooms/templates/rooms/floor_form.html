{% extends "base/base.html" %}

{% block title %}Add Floor{% endblock %}

{% block content %}

<h2>Add Floor</h2>

<div class="card">

<form method="post">

{% csrf_token %}

<label>Building</label><br>

<select name="building" required>

{% for b in buildings %}

<option value="{{ b.id }}">
{{ b.name }}
</option>

{% endfor %}

</select>

<br><br>

<label>Floor Name</label><br>

<input type="text"
       name="name"
       placeholder="Example: Floor 1 or Ground Floor"
       required>

<br><br>

<label>Floor Number</label><br>

<input type="number"
       name="number"
       placeholder="Example: 1"
       required>

<br><br>

<button class="btn btn-primary">
Save
</button>

<a href="{% url 'floor_list' %}" class="btn btn-secondary">
Cancel
</a>

</form>

</div>

{% endblock %}
