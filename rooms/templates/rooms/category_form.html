{% extends "base/base.html" %}

{% block header %}
<h2>
    {% if category %}Edit{% else %}Add{% endif %} Room Category
</h2>
{% endblock %}

{% block content %}
<form method="post">
    {% csrf_token %}

    <label>Name</label><br>
    <input type="text" name="name"
           value="{{ category.name|default:'' }}"
           required><br><br>

    <label>Description</label><br>
    <textarea name="description">{{ category.description|default:'' }}</textarea><br><br>

    <button type="submit">Save</button>
    <a href="{% url 'category_list' %}">Cancel</a>
</form>
{% endblock %}
