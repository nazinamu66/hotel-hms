{% extends "base/base.html" %}

{% block title %}Room Category{% endblock %}

{% block content %}

<h2>
{% if category %}Edit{% else %}Add{% endif %} Room Category
</h2>

<div class="card">

<form method="post">
{% csrf_token %}

<label>Name</label><br>
<input type="text"
       name="name"
       value="{{ category.name|default:'' }}"
       required>

<br><br>

<label>Description</label><br>
<textarea name="description">{{ category.description|default:'' }}</textarea>

<br><br>

<button class="btn btn-primary">Save</button>

<a class="btn btn-secondary"
   href="{% url 'category_list' %}">
Cancel
</a>

</form>

</div>

{% endblock %}
