{% extends "base/base.html" %}

{% block header %}
<h2>Add Building</h2>
{% endblock %}

{% block content %}
<form method="post">
    {% csrf_token %}
    <label>Building Name</label><br>
    <input type="text" name="name" required><br><br>
    <button type="submit">Save</button>
    <a href="{% url 'building_list' %}">Cancel</a>
</form>
{% endblock %}
