{% extends "base/base.html" %}

{% block title %}Check In{% endblock %}

{% block header %}
<h2>Check In – Room {{ room.room_number }}</h2>
{% endblock %}

{% block content %}

<form method="post">
{% csrf_token %}

<div style="display:grid; grid-template-columns:1fr 1fr; gap:20px; max-width:700px;">

    <div>
        <label>First Name</label><br>
        <input type="text" name="first_name" required>
    </div>

    <div>
        <label>Last Name</label><br>
        <input type="text" name="last_name" required>
    </div>

    <div>
        <label>Phone</label><br>
        <input type="text" name="phone">
    </div>

    <div>
        <label>Email</label><br>
        <input type="email" name="email">
    </div>

    <div>
        <label>Nationality</label><br>
        <input type="text" name="nationality">
    </div>

    <div>
        <label>ID / Passport Number</label><br>
        <input type="text" name="id_number">
    </div>

    <div>
        <label>Expected Checkout Date</label><br>
        <input type="date" name="expected_checkout">
    </div>

    <div>
        <label>Number of Guests</label><br>
        <input type="number" name="guest_count" value="1" min="1">
    </div>

</div>

<br>

<button type="submit">Check In</button>
<a href="/frontdesk/">Cancel</a>

</form>

<p style="margin-top:10px; color:#555;">
Returning guests can be checked in using phone number only.
</p>

{% endblock %}
