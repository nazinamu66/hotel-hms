{% extends "base/base.html" %}

{% block title %}Extend Stay{% endblock %}

{% block header %}
<h2>Extend Stay – Room {{ room.room_number }}</h2>
{% endblock %}

{% block content %}

<form method="post">
{% csrf_token %}

<p>
Current Checkout:
<strong>{{ folio.check_out_at|default:"Not set" }}</strong>
</p>

<label>New Checkout Date</label><br>

<input type="date"
       name="new_checkout"
       required>

<br><br>

<button type="submit">Extend Stay</button>

<a href="{% url 'frontdesk_active_stay' room.id %}">
Cancel
</a>

</form>

{% endblock %}
