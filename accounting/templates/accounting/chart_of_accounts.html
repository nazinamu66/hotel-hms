{% extends "base/base.html" %}

{% block content %}

<h2>Chart of Accounts</h2>

<table class="table">
    <thead>
        <tr>
            <th>Code</th>
            <th>Name</th>
            <th>Type</th>
            <th>Balance</th>
        </tr>
    </thead>

    <tbody>
        {% for acc in accounts %}
        <tr>
            <td>{{ acc.code }}</td>
            <td>
                <a href="{% url 'accounting:ledger' acc.id %}">
                    {{ acc.name }}
                </a>
            </td>            
            <td>{{ acc.get_account_type_display }}</td>
            <td>{{ acc.get_balance|floatformat:2 }}</td>
        </tr>
        {% empty %}
        <tr>
            <td colspan="4">No accounts found</td>
        </tr>
        {% endfor %}
    </tbody>
</table>

{% endblock %}
