{% extends "base/base.html" %}

{% block content %}

<h2>{{ account.name }} Ledger</h2>

<table class="table">
    <thead>
        <tr>
            <th>Date</th>
            <th>Reference</th>
            <th>Description</th>
            <th>Debit</th>
            <th>Credit</th>
            <th>Balance</th>
        </tr>
    </thead>

    <tbody>
        {% for line in ledger %}
        <tr>
            <td>{{ line.date }}</td>
            <td>{{ line.reference }}</td>
            <td>{{ line.description }}</td>
            <td>{{ line.debit }}</td>
            <td>{{ line.credit }}</td>
            <td>{{ line.balance }}</td>
        </tr>
        {% endfor %}
    </tbody>
</table>

{% endblock %}
