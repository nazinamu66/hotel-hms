{% extends "base/base.html" %}
{% block content %}

<h2>Low Stock Requests</h2>

<table border="1">
<tr>
    <th>Product</th>
    <th>Available</th>
    <th>Request</th>
</tr>

{% load store_extras %}

{% for product in products %}
<tr>
    <td>{{ product.name }}</td>

    {% with qty=stock_map|get_item:product.id %}
        <td>{{ qty|default:0 }}</td>
    {% endwith %}

    <td>
        <form method="post">
            {% csrf_token %}
            <input type="hidden" name="product_id" value="{{ product.id }}">
            <input type="number" name="quantity" min="1" required>
            <button type="submit">Request</button>
        </form>
    </td>
</tr>
{% endfor %}
</table>

{% endblock %}
