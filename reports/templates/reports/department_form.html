{% extends "base/base.html" %}

{% block title %}
    {% if edit_mode %}Edit Department{% else %}Create Department{% endif %}
{% endblock %}

{% block content %}

<h2>
    {% if edit_mode %}Edit Department{% else %}Create Department{% endif %}
</h2>

<form method="POST">
    {% csrf_token %}

    <div class="card">

        <!-- HOTEL -->
        <label>Hotel</label>
        <select name="hotel" required>

            <option value="">-- Select Hotel --</option>

            {% for hotel in hotels %}
                <option value="{{ hotel.id }}"
                    {% if dept and dept.hotel_id == hotel.id %}
                        selected
                    {% endif %}
                >
                    {{ hotel.name }}
                </option>
            {% endfor %}

        </select>

        <br><br>

        <!-- NAME -->
        <label>Department Name</label>
        <input
            type="text"
            name="name"
            value="{{ dept.name|default:'' }}"
            placeholder="e.g. Kitchen, Store, Frontdesk"
            required
        >

        <br><br>

        <!-- TYPE -->
        <label>Department Type</label>
        <select name="department_type" required>

            <option value="">-- Select Type --</option>

            {% for value, label in types %}
                <option value="{{ value }}"
                    {% if dept and dept.department_type == value %}
                        selected
                    {% endif %}
                >
                    {{ label }}
                </option>
            {% endfor %}

        </select>

        <br><br>

        <!-- ACTIONS -->
        <div style="display:flex; gap:10px;">

            <button class="btn btn-primary" type="submit">
                {% if edit_mode %}Update{% else %}Save{% endif %}
            </button>

            <a href="{% url 'department_list' %}" class="btn btn-secondary">
                Cancel
            </a>

        </div>

    </div>

</form>

{% endblock %}
