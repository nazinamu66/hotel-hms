{% extends "base/base.html" %}

{% block content %}

<h2>Cleaning History</h2>

<table border="1" cellpadding="6">

<tr>
<th>Date</th>
<th>Room</th>
<th>Cleaned By</th>
<th>Previous Status</th>
</tr>

{% for log in logs %}

<tr>
<td>{{ log.cleaned_at }}</td>
<td>{{ log.room.room_number }}</td>
<td>{{ log.cleaned_by }}</td>
<td>{{ log.previous_status }}</td>
</tr>

{% empty %}
<tr>
<td colspan="4">No cleaning history yet</td>
</tr>
{% endfor %}

</table>

{% endblock %}
