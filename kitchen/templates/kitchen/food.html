{% extends "base/base.html" %}
{% block content %}

<h2>Prepared Food (Portions)</h2>

<table class="table">
<tr><th>Food</th><th>Qty</th></tr>
{% for s in foods %}
<tr>
  <td>{{ s.product.name }}</td>
  <td>{{ s.quantity }}</td>
</tr>
{% empty %}
<tr><td colspan="2">No prepared food available.</td></tr>
{% endfor %}
</table>

{% endblock %}
